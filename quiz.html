<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamified Coding Creeper — Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <div class="brand"><span class="title-icon">🦎</span> Gamified Coding Creeper</div>
    <nav class="app-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="profile.html">Profile</a>
      <button type="button" class="btn-link" id="logout-btn">Logout</button>
    </nav>
  </header>
  <main class="main-content">
    <p><a href="dashboard.html">← Back to Dashboard</a></p>
    <div id="quiz-picker">
      <h1>Choose a topic</h1>
      <div class="card-list" id="topic-list"></div>
    </div>
    <div id="quiz-area" class="quiz-container" style="display:none;">
      <div class="quiz-progress-wrap">
        <span>Question <span id="q-num">1</span> of <span id="q-total">0</span></span>
        <div class="progress-bar-wrap"><div class="progress-bar" id="quiz-progress" style="width:0%"></div></div>
      </div>
      <div class="quiz-question" id="quiz-question">
        <h2 id="q-text"></h2>
        <ul class="quiz-options" id="q-options"></ul>
      </div>
      <div class="quiz-actions">
        <button type="button" class="btn btn-primary" id="quiz-next">Next</button>
      </div>
    </div>
    <div id="quiz-result" class="quiz-result" style="display:none;">
      <h2>Quiz complete!</h2>
      <p>Score: <span id="result-score">0</span> / <span id="result-total">0</span></p>
      <p class="xp-earned">+<span id="result-xp">0</span> XP</p>
      <a href="quiz.html" class="btn btn-primary" id="quiz-another">Another quiz</a>
      <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
    </div>
  </main>
  <script src="content.js"></script>
  <script src="content-data.js"></script>
  <script src="script.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
