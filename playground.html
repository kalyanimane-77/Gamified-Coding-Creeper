<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamified Coding Creeper — Playground Sandbox</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body class="app-shell">
  <header class="app-header">
    <div class="header-left">
      <span class="logo">🦎 CodeCreeper</span>
    </div>
    <div class="header-right">
      <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
      <button id="logout-btn" class="btn">Logout</button>
    </div>
  </header>

  <main class="app-main split-main" id="playground-area">
    <div class="playground-layout split-pane-container">
      <div class="playground-sidebar split-pane-left">
        <h2>Interactive Sandbox</h2>
        <p class="meta">Free code playground. Select a language and test your ideas.</p>
        
        <div class="playground-controls" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
          <div>
            <label for="lang-select" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 500;">Language</label>
            <select id="lang-select" style="width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 8px;">
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="cpp">C++</option>
              <option value="javascript">JavaScript</option>
            </select>
          </div>
          <div>
            <label for="theme-select" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 500;">Editor Theme</label>
            <select id="theme-select" style="width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 8px;">
              <option value="dark">Dark (Neon)</option>
              <option value="light">Light</option>
            </select>
          </div>
        </div>

        <div style="margin-top: 2rem;">
            <p><a href="dashboard.html" id="playground-back">← Back to Dashboard</a></p>
        </div>
      </div>

      <div class="playground-ide split-pane-right professional-ide">
        <div class="ide-container" id="ide-container-bg">
          <div class="ide-top-bar">
            <div class="ide-tabs">
              <div class="ide-tab active"><span class="ide-lang-badge" id="current-lang-badge">Python</span> main.<span id="file-ext">py</span></div>
            </div>
            <div class="ide-actions-top">
              <button class="icon-btn" id="format-btn" title="Format Code">✨</button>
              <button class="icon-btn" id="reset-btn" title="Reset Code">🔄</button>
              <button class="btn btn-primary run-btn icon-text-btn" id="playground-run-btn">
                <span class="icon">▶</span> Run Code
              </button>
            </div>
          </div>
          <div class="ide-editor-area">
            <div class="ide-line-numbers" id="line-numbers">1</div>
            <textarea class="ide-textarea" id="playground-editor" wrap="off" spellcheck="false" placeholder="Type your code..."></textarea>
          </div>
        </div>
        
        <div class="ide-bottom-panel">
          <div class="bottom-panel-header">
            <div class="panel-tabs">
              <button class="panel-tab active" data-target="console">Console</button>
              <button class="panel-tab" data-target="terminal">Terminal</button>
            </div>
            <div class="panel-actions">
              <button class="icon-btn" id="clear-console-btn" title="Clear Console">🗑️</button>
            </div>
          </div>
          <div class="panel-content active" id="console-content">
            <div class="ide-output" id="playground-output">Ready to run code...</div>
          </div>
          <div class="panel-content" id="terminal-content">
            <div class="ide-output terminal-output">CodecCreeper Bash (v1.0.0)<br/>$ <span class="cursor-blink">_</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js?v=5"></script>
  <script src="playground.js?v=5"></script>
</body>
</html>
