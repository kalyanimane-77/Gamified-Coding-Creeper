<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamified Coding Creeper — Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <div class="brand"><span class="title-icon">🦎</span> Gamified Coding Creeper</div>
    <nav class="app-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="profile.html">Profile</a>
      <button type="button" class="btn-link" id="logout-btn">Logout</button>
    </nav>
  </header>
  <main class="main-content">
    <p><a href="dashboard.html">← Back to Dashboard</a></p>
    <div id="flash-picker">
      <h1>Choose a topic</h1>
      <div class="card-list" id="topic-list"></div>
    </div>
    <div id="flash-area" style="display:none;">
      <div class="flashcard-counter">Card <span id="card-num">1</span> of <span id="card-total">0</span></div>
      <div class="flashcard-area">
        <div class="flashcard" id="flashcard">
          <div class="front"><span class="term" id="card-term"></span></div>
          <div class="back" style="display:none;"><span class="definition" id="card-def"></span><pre class="example" id="card-example"></pre></div>
        </div>
      </div>
      <p style="color:var(--text-muted);font-size:0.9rem;">Click the card to flip</p>
      <div class="flashcard-nav">
        <button type="button" class="btn" id="flash-prev">Previous</button>
        <button type="button" class="btn" id="flash-next">Next</button>
        <a href="flashcards.html" class="btn" id="flash-back">Choose topic</a>
      </div>
    </div>
  </main>
  <script src="content.js"></script>
  <script src="content-data.js"></script>
  <script src="script.js"></script>
  <script src="flashcards.js"></script>
</body>
</html>
